[net]
git-fetch-with-cli = true

# Enable wasip2 feature for wasm32-wasip2 target
[target.wasm32-wasip2]
rustflags = ["--cfg=unstable_wasi_extension", "--cfg=unstable_wasi_export_wasi_reactor"]

# ── celestia-devtools on-demand patches ───────────────────────────
# Generated by `celestia-devtools register-patches` (per-repo mode).
# Only patches deps this repo ACTUALLY uses — no crate-graph warnings.

[patch."https://github.com/celestia-island/hikari.git"]
hikari-components = { path = "D:/源代码/工程项目/celestia/hikari/packages/components" }
hikari-icons = { path = "D:/源代码/工程项目/celestia/hikari/packages/icons" }
hikari-palette = { path = "D:/源代码/工程项目/celestia/hikari/packages/palette" }
