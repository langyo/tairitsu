name: Security Audit

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
  pull_request:
    paths:
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'package.json'
      - 'packages/browser-glue/package.json'

jobs:
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove e2e/website from workspace and local patches
        run: |
          sed -i '/"packages\/e2e",/d; s/,"packages\/e2e"//g' Cargo.toml
          sed -i '/"examples\/website",/d; s/,"examples\/website"//g' Cargo.toml
          sed -i '/path = "\.\.\/hikari/d' Cargo.toml
          rm -f .cargo/config.toml Cargo.lock

      - name: Install cargo-audit
        uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked

      - name: Run audit
        run: cargo audit

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove e2e/website from workspace and local patches
        run: |
          sed -i '/"packages\/e2e",/d; s/,"packages\/e2e"//g' Cargo.toml
          sed -i '/"examples\/website",/d; s/,"examples\/website"//g' Cargo.toml
          sed -i '/path = "\.\.\/hikari/d' Cargo.toml
          rm -f .cargo/config.toml Cargo.lock

      - name: Install cargo-deny
        uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-deny --locked

      - name: Run deny check
        run: cargo deny check

  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --omit=dev
        working-directory: .

      - name: Run npm audit
        run: npm audit --omit=dev
        working-directory: .
