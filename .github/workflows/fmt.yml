name: Format
on:
  pull_request:
    paths:
      - '.github/workflows/fmt.yml'
      - 'packages/**/*'
      - 'examples/**/*'
      - 'Cargo.toml'
  push:
    branches: [master, dev]

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Remove e2e from workspace and local patches
        run: |
          sed -i '/"packages\/e2e"/d' Cargo.toml
          sed -i '/path = "\.\.\/hikari/d' Cargo.toml
          rm -f .cargo/config.toml Cargo.lock

      - name: Run fmt
        # no `--all`: a virtual workspace `cargo fmt` formats all members and
        # avoids traversing path deps (e.g. the local `../kou` dev override)
        run: cargo fmt -- --check
