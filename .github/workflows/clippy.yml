name: Clippy

on:
  pull_request:
    paths:
      - '.github/workflows/clippy.yml'
      - 'packages/**/*'
      - 'examples/**/*'
      - 'Cargo.toml'
  push:
    branches: [master, dev]

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - stable
          - nightly

    steps:
      - uses: actions/checkout@v4

      - name: Remove e2e/website from workspace and local patches
        run: |
          sed -i '/"packages\/e2e",/d; s/,"packages\/e2e"//g' Cargo.toml
          sed -i '/"examples\/website",/d; s/,"examples\/website"//g' Cargo.toml
          sed -i '/path = "\.\.\/hikari/d' Cargo.toml
          rm -f .cargo/config.toml Cargo.lock

      - name: Setup toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Run clippy
        run: |
          cargo clippy \
            --all-targets \
            --all-features \
            -- -D warnings
