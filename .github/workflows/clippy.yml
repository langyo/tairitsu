name: Clippy

on:
  pull_request:
    paths:
      - '.github/workflows/clippy.yml'
      - 'packages/**/*'
      - 'examples/**/*'
      - 'Cargo.toml'
  push:
    branches: [master, dev]

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - stable
          - nightly

    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Remove e2e from workspace and local patches
        run: |
          python3 -c "
import re
with open('Cargo.toml') as f: c = f.read()
c = re.sub(r',?\s*\"packages/e2e\"\s*', '', c)
c = re.sub(r'.*path\s*=\s*\"\.\.\/hikari.*\n', '', c)
with open('Cargo.toml', 'w') as f: f.write(c)
"
          rm -f .cargo/config.toml Cargo.lock

      - name: Run clippy
        run: |
          cargo clippy \
            --all-targets \
            --all-features \
            -- -D warnings
