name: Publish

on:
  push:
    tags: [v*]

jobs:
  verify:
    name: Verify versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract tag version
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Check all publishable packages match tag
        env:
          TAG: ${{ steps.tag.outputs.version }}
        run: |
          pip install tomlkit
          python3 -c "
          import tomlkit, sys, os
          TAG = os.environ['TAG']
          PACKAGES = [
              'tairitsu:packages/runtime',
              'tairitsu-macros:packages/macros',
              'tairitsu-browser-worlds:packages/browser-worlds',
              'tairitsu-vdom:packages/vdom',
              'tairitsu-style:packages/style',
              'tairitsu-hooks:packages/hooks',
              'tairitsu-browser-wit-resolver:packages/browser-wit-resolver',
              'tairitsu-ssr:packages/ssr',
              'tairitsu-packager:packages/packager',
              'tairitsu-web:packages/web',
          ]
          FAIL = 0
          with open('Cargo.toml') as f:
              root = tomlkit.load(f)
          root_ver = root.get('workspace', {}).get('package', {}).get('version', '')
          if root_ver != TAG:
              print(f'::error::workspace.package version ({root_ver}) != tag ({TAG})')
              FAIL = 1
          for entry in PACKAGES:
              entry = entry.strip()
              if not entry: continue
              pkg, _, dir_ = entry.partition(':')
              toml_path = f'{dir_}/Cargo.toml'
              try:
                  with open(toml_path) as f:
                      d = tomlkit.load(f)
              except FileNotFoundError:
                  print(f'::error::{toml_path} not found')
                  FAIL = 1
                  continue
              ver = d.get('package', {}).get('version', '')
              if isinstance(ver, dict) or (isinstance(ver, str) and 'workspace' in str(ver).lower()):
                  print(f'::notice::{pkg} uses workspace version ({root_ver}) — OK')
              elif ver == TAG:
                  print(f'::notice::{pkg} version ({ver}) matches tag')
              else:
                  print(f'::error::{pkg} version ({ver}) != tag ({TAG}) in {toml_path}')
                  FAIL = 1
          sys.exit(1 if FAIL else 0)
          "

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Ensure tag is on master
        run: |
          git fetch origin master --depth=1
          if ! git merge-base --is-ancestor HEAD origin/master; then
            echo "::error::Tag must be on master branch to publish"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Strip examples and path-dep packages from workspace
        run: |
          pip install tomlkit
          python3 -c "
          import tomlkit
          with open('Cargo.toml') as f: d = tomlkit.load(f)
          members = d['workspace']['members']
          # Remove examples and packages with external path deps (mcp needs kou)
          d['workspace']['members'] = [
              m for m in members
              if not m.startswith('examples/') and m != 'packages/mcp'
          ]
          with open('Cargo.toml', 'w') as f: tomlkit.dump(d, f)
          "

      - run: echo "${{ secrets.CRATES_IO_API_TOKEN }}" | cargo login

      - name: Skip if already published
        id: check-exists
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/${CRATE}/${VERSION}" || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "::warning::Version ${VERSION} already published — skipping."
            exit 78
          fi
        env:
          CRATE: tairitsu-macros

      - run: python3 scripts/publish_crates.py

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: verify
    if: false  # Disabled until @celestia-island/tairitsu-web-glue is registered on npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org/

      - name: Install esbuild
        run: npm install -g esbuild@0.25.4

      - name: Build glue packages
        run: python3 scripts/build_npm_glue_packages.py

      - name: Verify dist contents
        run: |
          cd packages/npm/celestia-tairitsu-web-glue
          if [ ! -d "dist" ] || [ -z "$(ls -A dist)" ]; then
            echo "::error::dist/ is empty or missing — build failed"
            exit 1
          fi
          echo "dist/ contents:"
          find dist -type f | head -40
          npm pack --dry-run 2>&1 | grep -E "npm notice (name|version|total files|package size)"

      - name: Publish
        run: |
          cd packages/npm/celestia-tairitsu-web-glue
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
