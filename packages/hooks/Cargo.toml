[package]
name = "tairitsu-hooks"
version.workspace = true
description = "Hooks system for Tairitsu"
authors.workspace = true
license.workspace = true
license-file.workspace = true
edition.workspace = true
repository.workspace = true

[lib]
# rlib only — this crate is consumed as a normal Rust dependency by
# hikari-components, lagrange, etc. cdylib would produce a DLL that the
# Rust linker cannot use as a regular dep.
crate-type = ["rlib"]

[features]
default = []

[dependencies]

anyhow = { workspace = true }
tairitsu-vdom = { workspace = true }
tracing = { workspace = true }
[target.'cfg(not(target_family = "wasm"))'.dependencies]
tokio = { workspace = true, default-features = false, features = [
  "sync",
  "macros",
  "io-util",
  "rt",
  "time",
] }

[target.'cfg(target_family = "wasm")'.dependencies]
wit-bindgen = { workspace = true }

[dev-dependencies]

tairitsu-macros = { workspace = true }
tokio = { workspace = true, default-features = false, features = [
  "sync",
  "macros",
  "io-util",
  "rt",
  "time",
] }
