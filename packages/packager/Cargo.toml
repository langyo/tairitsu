[package]
name = "tairitsu-packager"
version.workspace = true
edition.workspace = true
description = "Build and packaging tool for Tairitsu applications"
authors.workspace = true
license.workspace = true
license-file.workspace = true
repository.workspace = true

[[bin]]
name = "tairitsu"
path = "src/main.rs"

[dependencies]

yuuka = "^0.6"

anyhow = { workspace = true }
axum = { workspace = true, optional = true }
base64 = { workspace = true, optional = true }
chrono = { workspace = true }
clap = { workspace = true, optional = true }
crossterm = { workspace = true, optional = true }
futures = { workspace = true }
grass = { workspace = true }
image = { workspace = true, optional = true }
include_dir = "^0.7"
indicatif = { workspace = true }
notify = { version = "^8", optional = true }
portable-pty = { workspace = true, optional = true }
regex = { workspace = true }
reqwest = { workspace = true, features = [
  "blocking",
  "stream",
], optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
sys-locale = "^0.3"
tairitsu-browser-fetch = { workspace = true, optional = true }
tairitsu-browser-wit-resolver = { workspace = true }
tairitsu-browser-worlds = { workspace = true }
tairitsu-ssr = { workspace = true, optional = true }
tera = "^1"
thiserror = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "net", "process"], optional = true }
tokio-stream = { workspace = true, features = ["sync"], optional = true }
tokio-tungstenite = { version = "^0.27", default-features = false, features = ["connect"], optional = true }
toml = { workspace = true }
tower-http = { workspace = true, features = ["fs", "cors", "compression-gzip"], optional = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
vte = { workspace = true, optional = true }
walkdir = "^2"
webbrowser = "^1"
wit-parser = { workspace = true }
zip = { workspace = true, optional = true }
[dev-dependencies]

tempfile = { workspace = true }
[features]
default = ["tokio", "native", "cli", "dev-server", "ssr", "icon-fetch", "debug-api", "debug-browser", "vtty", "visual-diff", "test-runner"]
native = ["tokio", "crossterm"]
dev-server = [
  "axum",
  "tower-http",
  "notify",
  "tairitsu-ssr",
  "tokio",
  "tokio-stream",
]
debug-browser = ["dev-server", "reqwest", "tokio-tungstenite", "base64", "tairitsu-browser-fetch"]
debug-api = ["dev-server"]
ssr = ["tairitsu-ssr", "tokio"]
cli = ["clap"]
icon-fetch = ["reqwest", "zip"]
visual-diff = ["image", "base64"]
# Use full Chrome for Testing (~300MB) instead of the default headless-shell
# (~90MB). Forwarded to tairitsu-browser-fetch's additive `full` toggle.
browser-full = ["tairitsu-browser-fetch/full"]
test-runner = ["reqwest", "image", "base64"]
vtty = ["vte", "portable-pty"]

[target.'cfg(target_os = "linux")'.dependencies]
 libc = { workspace = true }

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61", features = [
  "Win32_Foundation",
  "Win32_Security",
  "Win32_Storage_FileSystem",
  "Win32_System_Console",
  "Win32_System_Threading",
  "Win32_System_Memory",
  "Win32_System_Diagnostics_ToolHelp",
] }

