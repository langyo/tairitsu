[package]
name = "tairitsu-macros"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
license-file.workspace = true
repository.workspace = true
description = "Procedural macros for Tairitsu framework (rsx!, scss!, component, wit_interface!, etc.)"

[lib]
proc-macro = true

[dependencies]

