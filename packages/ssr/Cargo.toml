[package]
name = "tairitsu-ssr"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
license-file.workspace = true
repository.workspace = true
description = "Server-Side Rendering engine for Tairitsu WASM components"

[dependencies]
tairitsu = { workspace = true }
tairitsu-vdom = { workspace = true }
tairitsu-hooks = { workspace = true, optional = true }
tairitsu-browser-worlds = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
wasmtime = { workspace = true }
wasmtime-wasi = { workspace = true }
tracing = { workspace = true }
bytes = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { version = "^1.11", features = ["v4"] }
regex = { workspace = true }
async-trait = { workspace = true }
reqwest = { workspace = true, optional = true }
futures = { workspace = true, optional = true }
async-stream = { version = "^0.3", optional = true }
tokio = { workspace = true, features = ["full"], optional = true }
tokio-stream = { workspace = true, optional = true, default-features = false }

[features]
default = []
streaming = ["tokio", "tokio-stream", "futures", "async-stream"]
hmr = []
fast-refresh = ["dep:tairitsu-hooks", "hmr"]
error-overlay = ["hmr"]
data-fetcher = ["tokio", "dep:reqwest"]
dev = ["hmr", "fast-refresh", "error-overlay", "data-fetcher"]

