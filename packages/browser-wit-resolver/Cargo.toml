[package]
name = "tairitsu-browser-wit-resolver"
version.workspace = true
edition.workspace = true
description = "WIT package version resolution, cloud fetch, and local cache for Tairitsu browser worlds"
authors.workspace = true
license-file.workspace = true
repository.workspace = true

[dependencies]
tairitsu-browser-worlds = { workspace = true, optional = true }
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
reqwest = { workspace = true, features = [
  "blocking",
], optional = true }
sha2 = { workspace = true }
hex = { workspace = true }

[features]
default = ["embedded"]
fetch = ["reqwest"]
embedded = ["tairitsu-browser-worlds"]

[dev-dependencies]
tempfile = { workspace = true }
