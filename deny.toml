[advisories]
ignore = [
    "RUSTSEC-2024-0436",
    "RUSTSEC-2017-0008",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "NCSA",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "LicenseRef-sysl-1.0",
]
confidence-threshold = 0.8
exceptions = [
    { allow = ["LicenseRef-PROPRIETARY"], crate = "tairitsu" },
    { allow = ["LicenseRef-PROPRIETARY"], crate = "tairitsu-browser" },
    { allow = ["LicenseRef-PROPRIETARY"], crate = "tairitsu-browser-fetch" },
    { allow = ["LicenseRef-PROPRIETARY"], crate = "tairitsu-browser-test" },
    { allow = ["LicenseRef-PROPRIETARY"], crate = "tairitsu-browser-wit-resolver" },
    { allow = ["LicenseRef-PROPRIETARY"], crate = "tairitsu-browser-worlds" },
    { allow = ["LicenseRef-PROPRIETARY"], crate = "tairitsu-hooks" },
    { allow = ["LicenseRef-PROPRIETARY"], crate = "tairitsu-macros" },
    { allow = ["LicenseRef-PROPRIETARY"], crate = "tairitsu-mcp" },
    { allow = ["LicenseRef-PROPRIETARY"], crate = "tairitsu-packager" },
    { allow = ["LicenseRef-PROPRIETARY"], crate = "tairitsu-ssr" },
    { allow = ["LicenseRef-PROPRIETARY"], crate = "tairitsu-style" },
    { allow = ["LicenseRef-PROPRIETARY"], crate = "tairitsu-vdom" },
    { allow = ["LicenseRef-PROPRIETARY"], crate = "tairitsu-web" },
    { allow = ["LicenseRef-PROPRIETARY"], crate = "tairitsu-example-todo-app" },
    { allow = ["LicenseRef-PROPRIETARY"], crate = "tairitsu-example-wasi-plugin" },
    { allow = ["LicenseRef-PROPRIETARY"], crate = "tairitsu-example-wit-compile-time" },
    { allow = ["LicenseRef-PROPRIETARY"], crate = "tairitsu-example-wit-dynamic-advanced" },
    { allow = ["LicenseRef-PROPRIETARY"], crate = "tairitsu-example-wit-runtime" },
    { allow = ["LicenseRef-PROPRIETARY"], crate = "tairitsu-example-wit-native-simple" },
    { allow = ["LicenseRef-PROPRIETARY"], crate = "tairitsu-example-wit-native-macro" },
    { allow = ["LicenseRef-PROPRIETARY"], crate = "tairitsu-kei-desktop" },
    { allow = ["LicenseRef-PROPRIETARY"], crate = "vtty-graphics-demo" },
]

[bans]
multiple-versions = "warn"
skip = [
    { name = "base64", version = "0.21" },
    { name = "rand", version = "0.7" },
    { name = "rand", version = "0.8" },
    { name = "toml", version = "0.8" },
    { name = "thiserror", version = "1" },
    { name = "zip", version = "0.6" },
    { name = "dirs", version = "5" },
    { name = "which", version = "7" },
]
skip-tree = [
    { name = "chromiumoxide", version = "0.9" },
    { name = "wasmtime", version = "43" },
]
