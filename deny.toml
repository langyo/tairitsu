[advisories]
ignore = [
    "RUSTSEC-2024-0436",
    "RUSTSEC-2017-0008",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "NCSA",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "LicenseRef-sysl-1.0",
]
confidence-threshold = 0.8
clarify = [
    { crate = "tairitsu", expression = "MIT" },
    { crate = "tairitsu-browser", expression = "MIT" },
    { crate = "tairitsu-browser-fetch", expression = "MIT" },
    { crate = "tairitsu-browser-test", expression = "MIT" },
    { crate = "tairitsu-browser-wit-resolver", expression = "MIT" },
    { crate = "tairitsu-browser-worlds", expression = "MIT" },
    { crate = "tairitsu-hooks", expression = "MIT" },
    { crate = "tairitsu-macros", expression = "MIT" },
    { crate = "tairitsu-mcp", expression = "MIT" },
    { crate = "tairitsu-packager", expression = "MIT" },
    { crate = "tairitsu-ssr", expression = "MIT" },
    { crate = "tairitsu-style", expression = "MIT" },
    { crate = "tairitsu-vdom", expression = "MIT" },
    { crate = "tairitsu-web", expression = "MIT" },
    { crate = "tairitsu-example-todo-app", expression = "MIT" },
    { crate = "tairitsu-example-wasi-plugin", expression = "MIT" },
    { crate = "tairitsu-example-wit-compile-time", expression = "MIT" },
    { crate = "tairitsu-example-wit-dynamic-advanced", expression = "MIT" },
    { crate = "tairitsu-example-wit-runtime", expression = "MIT" },
    { crate = "tairitsu-example-wit-native-simple", expression = "MIT" },
    { crate = "tairitsu-example-wit-native-macro", expression = "MIT" },
    { crate = "tairitsu-kei-desktop", expression = "MIT" },
    { crate = "vtty-graphics-demo", expression = "MIT" },
]

[bans]
multiple-versions = "warn"
skip = [
    { name = "base64", version = "0.21" },
    { name = "rand", version = "0.7" },
    { name = "rand", version = "0.8" },
    { name = "toml", version = "0.8" },
    { name = "thiserror", version = "1" },
    { name = "zip", version = "0.6" },
    { name = "dirs", version = "5" },
    { name = "which", version = "7" },
]
skip-tree = [
    { name = "chromiumoxide", version = "0.9" },
    { name = "wasmtime", version = "43" },
]
